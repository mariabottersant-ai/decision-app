name: Build Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Instalar dependencias Node
        run: npm install

      - name: Build Tauri para Windows
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v1.0.0
          releaseName: DecisionApp v1.0.0
          releaseBody: |
            App de escritorio para Teoría de las Decisiones
            
            Descargá el instalador para tu sistema:
            - Windows: DecisionApp_1.0.0_x64-setup.exe
            - Linux: DecisionApp_1.0.0_amd64.AppImage
          releaseDraft: false
          prerelease: false
